# =============================================================================
# N-Body PINN - Conservation-Augmented Sweep Configuration
# =============================================================================
#
# Hyperparameter search space for conservation-augmented models (all three
# penalties: energy, momentum, angular momentum). Multiple sweeps were run
# with sub-ranges of these parameters; this config represents the overall
# search space described in the paper.
#
# See also: sweep_baseline.yaml (identical except conservation weights = 0)
# =============================================================================

command:
  - python
  - ${program}
  - ${args}
program: train.py
project: nbody-pinn-v3.6
method: random
metric:
  goal: minimize
  name: best_val_mse

run_cap: 40

parameters:
  # ==========================================================================
  # Loss weights - Use top-20% medians as center, narrow range
  # ==========================================================================

  weight_energy:
    min: 0.1
    max: 5.0
    distribution: log_uniform_values

  weight_momentum:
    min: 0.1
    max: 5.0
    distribution: log_uniform_values

  weight_angular_momentum:
    min: 0.1
    max: 5.0
    distribution: log_uniform_values

  # ==========================================================================
  # Data parameters (FIXED)
  # ==========================================================================
  num_train_traj:
    value: 2000
  num_val_traj:
    value: 250
  num_test_traj:
    value: 250
  traj_steps:
    value: 300
  rollout_steps:
    value: 10

  # ==========================================================================
  # Physics parameters (FIXED)
  # ==========================================================================
  n_bodies:
    value: 6
  dim:
    value: 3
  dt:
    value: 0.01
  G:
    value: 1
  softening:
    value: 0.001

  # ==========================================================================
  # Model architecture - All perform identically, pick simplest
  # ==========================================================================

  hidden_sizes:
    values:
      - "[128, 128, 128]"
      - "[256, 256, 256, 128]"
      - "[512, 256, 128]"
      - "[256, 256, 256, 256]"

  # ==========================================================================
  # Drift Mode Configuration
  # ==========================================================================

  use_integrated_energy_drift:
    value: true

  use_integrated_momentum_drift:
    value: true

  use_integrated_angular_drift:
    value: true

  # ==========================================================================
  # Adaptive Temporal Weighting
  # ==========================================================================

  temporal_decay_alpha:
    min: 0.5
    max: 10.0
    distribution: log_uniform_values

  apply_temporal_to_conservation:
    value: true

  # ==========================================================================
  # Dynamic Gradient Balancing
  # ==========================================================================

  use_dynamic_normalization:
    value: false

  norm_update_interval:
    value: 10

  norm_update_momentum:
    value: 0.9

  # ==========================================================================
  # Training parameters
  # ==========================================================================
  epochs:
    value: 100

  batch_size:
    value: 64

  learning_rate:
    min: 0.0005
    max: 0.005
    distribution: log_uniform_values

  # ==========================================================================
  # Early Stopping
  # ==========================================================================

  early_stopping_patience:
    value: 20

  # ==========================================================================
  # FP64 Training Mode
  # ==========================================================================

  use_fp64_training:
    value: true

  # ==========================================================================
  # Learning rate scheduler - All perform identically
  # ==========================================================================

  scheduler_type:
    values:
      - step
      - plateau
      - none

  scheduler_eta_min:
    value: 0.000001

  scheduler_step_size:
    value: 10

  scheduler_gamma:
    value: 0.5

  scheduler_patience:
    value: 5

  scheduler_factor:
    value: 0.5
